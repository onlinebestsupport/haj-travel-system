<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <title>Users Debug Tool</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #ffff00; }
        pre { background: #2d2d2d; padding: 10px; border-radius: 5px; overflow: auto; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
    <script src="/admin/js/session-manager.js"></script>
</head>
<body>
    <h1>🔍 Users Page Debug Tool</h1>
    
    <div>
        <button onclick="testSession()">1. Test Session</button>
        <button onclick="testUsersAPI()">2. Test Users API</button>
        <button onclick="testCreateUser()">3. Test Create User</button>
        <button onclick="checkLocalStorage()">4. Check Storage</button>
        <button onclick="runAllTests()">▶ Run All Tests</button>
    </div>

    <div id="output"></div>

    <script>
        // ====== LOCAL LOG FUNCTION ======
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const color = type === 'success' ? '#00ff00' : type === 'error' ? '#ff0000' : '#ffff00';
            output.innerHTML += `<div style="color: ${color}">${message}</div>`;
        }

        // ====== TEST SESSION ======
        async function testSession() {
            log('\n📡 Testing Session...', 'info');
            try {
                const response = await fetch('/api/check-session', {
                    credentials: 'include'
                });
                const data = await response.json();
                log(`✅ Session Status: ${response.status}`, 'success');
                log(`📊 Session Data: ${JSON.stringify(data, null, 2)}`, 'info');
                return data;
            } catch (error) {
                log(`❌ Session Error: ${error.message}`, 'error');
                return null;
            }
        }

        // ====== TEST USERS API ======
        async function testUsersAPI() {
            log('\n📡 Testing Users API...', 'info');
            try {
                const response = await fetch('/api/admin/users', {
                    credentials: 'include'
                });
                const data = await response.json();
                log(`✅ API Status: ${response.status}`, 'success');
                log(`📊 Users Found: ${data.users?.length || 0}`, 'info');
                
                // FIXED: Using standard for loop instead of forEach
                if (data.users) {
                    for (let i = 0; i < data.users.length; i++) {
                        const user = data.users[i];
                        log(`  - ${user.username} (${user.role})`, 'info');
                    }
                }
                return data;
            } catch (error) {
                log(`❌ API Error: ${error.message}`, 'error');
                return null;
            }
        }

        // ====== TEST CREATE USER ======
        async function testCreateUser() {
            log('\n📡 Testing Create User Form...', 'info');
            
            const form = document.getElementById('addUserForm');
            if (!form) {
                log('❌ Add user form not found in DOM', 'error');
                return;
            }
            
            log('✅ Add user form exists', 'success');
            
            // Check form elements
            const required = ['username', 'password', 'email', 'role'];
            for (let i = 0; i < required.length; i++) {
                const id = required[i];
                const el = document.getElementById(id);
                if (el) {
                    log(`  ✅ Found ${id} input`, 'success');
                } else {
                    log(`  ❌ Missing ${id} input`, 'error');
                }
            }
        }

        // ====== CHECK LOCAL STORAGE ======
        async function checkLocalStorage() {
            log('\n🔍 Checking Local Storage...', 'info');
            const keys = Object.keys(localStorage);
            if (keys.length === 0) {
                log('❌ Local Storage is empty', 'error');
            } else {
                log(`📊 Found ${keys.length} items in Local Storage:`, 'info');
                for (let i = 0; i < keys.length; i++) {
                    const key = keys[i];
                    log(`  - ${key}`, 'info');
                }
            }
        }

        // ====== RUN ALL TESTS ======
        async function runAllTests() {
            log('\n▶ Running All Tests...\n', 'info');
            await testSession();
            await testUsersAPI();
            await testCreateUser();
            await checkLocalStorage();
            log('\n✅ All tests completed!', 'success');
        }
    </script>

<script>
function logout() {
    fetch('/api/logout', { 
        method: 'POST', 
        credentials: 'include' 
    }).then(() => {
        window.location.href = '/admin.login.html';
    }).catch(() => {
        window.location.href = '/admin.login.html';
    });
}
</script>

</body>
</html>

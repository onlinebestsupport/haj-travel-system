name: ✅ Validate Configuration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate configuration
      run: |
        python config_validator.py
    
    - name: Check Procfile
      run: |
        if ! grep -q "app.server:app" Procfile; then
          echo "❌ Procfile does not use correct import path"
          exit 1
        fi
        echo "✅ Procfile is correctly configured"
    
    - name: Check start.sh
      run: |
        if ! grep -q "app.server:app" start.sh; then
          echo "❌ start.sh does not use correct import path"
          exit 1
        fi
        echo "✅ start.sh is correctly configured"
    
    - name: Validate Python syntax
      run: |
        python -m py_compile app/server.py
        python -m py_compile app/database.py
        python -m py_compile app/__init__.py
        echo "✅ All Python files have valid syntax"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - Alhudha Haj Travel System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ====== 🎨 RESET & BASE STYLES ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
        }

        /* ====== 🌀 ANIMATED BACKGROUND ====== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ====== 📦 LOGIN WRAPPER ====== */
        .login-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto;
            position: relative;
            z-index: 1;
            padding: 20px 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            padding: 50px 40px;
            position: relative;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== 🏠 LOGIN HEADER ====== */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header .logo-wrapper {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.3);
        }

        .login-header .logo-wrapper i {
            font-size: 3.5rem;
            color: #f1c40f;
        }

        .login-header h1 {
            color: #1e3c72;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 1rem;
        }

        /* ====== 🔑 DEMO CREDENTIALS CARD ====== */
        .demo-credentials {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 4px solid #f1c40f;
            position: relative;
            overflow: hidden;
        }

        .demo-credentials::before {
            content: '🔐';
            position: absolute;
            right: 10px;
            bottom: 10px;
            font-size: 3rem;
            opacity: 0.1;
            pointer-events: none;
        }

        .demo-credentials p {
            color: #2c3e50;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .demo-credentials p i {
            color: #f1c40f;
            width: 20px;
        }

        .demo-credentials .credential-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: white;
            border-radius: 8px;
            margin: 8px 0;
            font-family: monospace;
            font-size: 0.95rem;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .demo-credentials .credential-row:hover,
        .demo-credentials .credential-row:active {
            background: #e8f4f8;
            transform: translateX(5px);
            border-color: #3498db;
        }

        .demo-credentials .credential-row span:first-child {
            color: #1e3c72;
            font-weight: 600;
        }

        .demo-credentials .credential-row span:last-child {
            color: #27ae60;
        }

        /* ====== ⚠️ MESSAGE CONTAINERS ====== */
        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #e74c3c;
            font-size: 0.95rem;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #27ae60;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== 📝 FORM ELEMENTS ====== */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label i {
            color: #3498db;
            margin-right: 8px;
            width: 18px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 1.1rem;
            z-index: 2;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 45px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-wrapper input:focus {
            border-color: #3498db;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #95a5a6;
            transition: all 0.3s;
            z-index: 3;
            padding: 10px;
            background: transparent;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover,
        .password-toggle:active {
            color: #3498db;
            background: rgba(52, 152, 219, 0.1);
        }

        /* ====== 🚀 LOGIN BUTTON ====== */
        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before,
        .login-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover,
        .login-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        .login-btn i {
            font-size: 1.2rem;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ====== ✅ REMEMBER ME SECTION ====== */
        .remember-me {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }

        .remember-me label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7f8c8d;
            cursor: pointer;
            padding: 5px 0;
        }

        .remember-me input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3498db;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .forgot-password:hover,
        .forgot-password:active {
            color: #2980b9;
            background: rgba(52, 152, 219, 0.1);
            text-decoration: none;
        }

        /* ====== ℹ️ SESSION INFO SECTION ====== */
        .session-info {
            background: #e8f4f8;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #3498db;
        }

        .session-info i {
            color: #3498db;
            font-size: 1.5rem;
        }

        .session-info .info-text {
            flex: 1;
        }

        .session-info .info-text strong {
            color: #2c3e50;
            display: block;
            margin-bottom: 3px;
        }

        .session-info .info-text small {
            color: #7f8c8d;
            font-size: 0.8rem;
        }

        /* ====== 📌 FOOTER ====== */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
        }

        .footer a {
            color: #3498db;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
        }

        .footer a:hover,
        .footer a:active {
            color: #2980b9;
            gap: 10px;
            background: rgba(52, 152, 219, 0.1);
        }

        .footer a i {
            font-size: 0.9rem;
        }

        /* ====== ⏳ LOADING SPINNER ====== */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ====== 📱 RESPONSIVE DESIGN ====== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .login-wrapper {
                padding: 20px 0;
            }

            .login-container {
                padding: 30px 25px;
            }

            .login-header h1 {
                font-size: 1.8rem;
            }

            .login-header .logo-wrapper {
                width: 80px;
                height: 80px;
            }

            .login-header .logo-wrapper i {
                font-size: 2.8rem;
            }

            .demo-credentials {
                padding: 15px;
            }

            .demo-credentials .credential-row {
                padding: 8px 12px;
                font-size: 0.9rem;
            }

            .input-wrapper input {
                padding: 14px 14px 14px 45px;
            }

            .login-btn {
                padding: 16px;
            }

            .footer a {
                padding: 10px 20px;
                background: white;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px 20px;
            }

            .login-header {
                margin-bottom: 25px;
            }

            .login-header h1 {
                font-size: 1.6rem;
            }

            .demo-credentials {
                margin-bottom: 20px;
            }

            .demo-credentials .credential-row {
                flex-direction: column;
                gap: 5px;
                text-align: center;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .remember-me {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .forgot-password {
                align-self: flex-end;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 20px 15px;
            }

            .login-header h1 {
                font-size: 1.4rem;
            }

            .login-header p {
                font-size: 0.9rem;
            }

            .demo-credentials p {
                font-size: 0.9rem;
            }

            .demo-credentials .credential-row {
                font-size: 0.8rem;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            body {
                align-items: flex-start;
            }

            .login-wrapper {
                padding: 10px 0;
            }

            .login-container {
                padding: 20px 25px;
            }

            .login-header {
                margin-bottom: 15px;
            }

            .login-header .logo-wrapper {
                width: 60px;
                height: 60px;
                margin-bottom: 15px;
            }

            .login-header .logo-wrapper i {
                font-size: 2rem;
            }

            .demo-credentials {
                display: none;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .login-btn {
                padding: 12px;
            }
        }

        .input-wrapper.focused i {
            color: #3498db;
        }
    </style>
</head>
<body>
    <!-- ====== 📦 MAIN LOGIN CONTAINER ====== -->
    <div class="login-wrapper">
        <div class="login-container">
            <!-- ====== 🏠 LOGIN HEADER ====== -->
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fas fa-kaaba"></i>
                </div>
                <h1>Admin Login</h1>
                <p>Alhudha Haj Travel System</p>
            </div>

            <!-- ====== 🔑 DEMO CREDENTIALS ====== -->
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> <strong>Demo Credentials:</strong></p>
                <div class="credential-row" onclick="fillCredentials('superadmin', 'admin123')">
                    <span>Super Admin:</span>
                    <span>superadmin / admin123</span>
                </div>
                <div class="credential-row" onclick="fillCredentials('admin1', 'admin123')">
                    <span>Admin:</span>
                    <span>admin1 / admin123</span>
                </div>
                <div class="credential-row" onclick="fillCredentials('manager1', 'admin123')">
                    <span>Manager:</span>
                    <span>manager1 / admin123</span>
                </div>
                <div class="credential-row" onclick="fillCredentials('staff1', 'admin123')">
                    <span>Staff:</span>
                    <span>staff1 / admin123</span>
                </div>
                <div class="credential-row" onclick="fillCredentials('viewer1', 'admin123')">
                    <span>Viewer:</span>
                    <span>viewer1 / admin123</span>
                </div>
            </div>

            <!-- ====== ℹ️ SESSION INFO (Shows if already logged in) ====== -->
            <div id="sessionInfo" class="session-info" style="display: none;">
                <i class="fas fa-info-circle"></i>
                <div class="info-text">
                    <strong>Already logged in as <span id="sessionUserName"></span></strong>
                    <small>Session will expire in <span id="sessionExpiry">30 minutes</span></small>
                </div>
                <button onclick="window.location.href='/admin/dashboard.html'" class="login-btn" style="width: auto; padding: 10px 20px; margin: 0;">
                    Go to Dashboard
                </button>
            </div>

            <!-- ====== ⚠️ MESSAGE CONTAINERS ====== -->
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>

            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i> <span id="successText"></span>
            </div>

            <!-- ====== 📝 LOGIN FORM ====== -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autofocus autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="off">
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                    </div>
                </div>

                <div class="remember-me">
                    <label>
                        <input type="checkbox" id="rememberMe"> Remember Me
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPassword(event)">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> <span>Login</span>
                </button>
            </form>

            <!-- ====== 📌 FOOTER ====== -->
            <div class="footer">
                <p><a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
    <script src="/admin/js/session-manager.js"></script>

    <script>
        // ====== 🔑 GLOBAL FUNCTIONS ======

        // Fill credentials from demo cards
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;

            document.getElementById('username').style.backgroundColor = '#e8f4f8';
            document.getElementById('password').style.backgroundColor = '#e8f4f8';

            setTimeout(() => {
                document.getElementById('username').style.backgroundColor = '';
                document.getElementById('password').style.backgroundColor = '';
            }, 500);

            document.getElementById('password').focus();
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Forgot password handler
        function showForgotPassword(event) {
            event.preventDefault();
            alert('Please contact your system administrator to reset your password.\n\nEmail: admin@alhudha.com\nPhone: +91 9876543210');
        }

        console.log('✅ Admin login page loaded');
    </script>
</body>
</html>

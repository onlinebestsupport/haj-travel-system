<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/admin/admin-style.css">
    <title>Simple Login Test</title>
    <script src="/admin/js/mobile-fix.js"></script>
</head>
<body>
    <h1>Simple Login Test</h1>
    <button onclick="login()">Login</button>
    <button onclick="SessionManager.checkSession()">Check Session</button>
    <button onclick="goToDashboard()">Go to Dashboard</button>
    <div id="result"></div>

    <script>
        async function login() {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({
                    username: 'superadmin',
                    password: 'admin123'
                })
            });
            const data = await response.json();
            document.getElementById('result').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            
            if (data.authenticated) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminName', data.user.name);
                setTimeout(() => goToDashboard(), 1000);
            }
        }

        async function SessionManager.checkSession() {
            const response = await fetch('/api/check-session', {
                credentials: 'include'
            });
            const data = await response.json();
            document.getElementById('result').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        function goToDashboard() {
            window.location.href = '/admin/dashboard.html';
        }

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('result').innerHTML = 
                'Already logged in as ' + sessionStorage.getItem('adminName');
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof SessionManager !== 'undefined') {
                SessionManager.initPage();
            }
        });
    </script>
    

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    var mobileToggle = document.querySelector('.mobile-toggle');
    var navLinks = document.querySelector('.nav-links');
    
    if (mobileToggle && navLinks) {
        mobileToggle.addEventListener('click', function() {
            navLinks.classList.toggle('active');
        });
    }
});
</script>

</body>
</html>

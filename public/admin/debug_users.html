<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <title>Users Debug Tool</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #ffff00; }
        pre { background: #2d2d2d; padding: 10px; border-radius: 5px; overflow: auto; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
    <script src="/admin/js/mobile-fix.js"></script>
</head>
<body>
    <h1>🔍 Users Page Debug Tool</h1>
    
    <div>
        <button onclick="testSession()">1. Test Session</button>
        <button onclick="testUsersAPI()">2. Test Users API</button>
        <button onclick="testCreateUser()">3. Test Create User</button>
        <button onclick="checkLocalStorage()">4. Check Storage</button>
        <button onclick="runAllTests()">▶ Run All Tests</button>
    </div>

    <div id="output"></div>

    <script>
        // ====== LOCAL LOG FUNCTION ======
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const color = type === 'success' ? '#00ff00' : type === 'error' ? '#ff0000' : '#ffff00';
            output.innerHTML += `<div style="color: ${color}">${message}</div>`;
        }

        // ====== TEST SESSION ======
        async function testSession() {
            log('\n📡 Testing Session...', 'info');
            try {
                const response = await fetch('/api/check-session', {
                    credentials: 'include'
                });
                const data = await response.json();
                log(`✅ Session Status: ${response.status}`, 'success');
                log(`📊 Session Data: ${JSON.stringify(data, null, 2)}`, 'info');
                return data;
            } catch (error) {
                log(`❌ Session Error: ${error.message}`, 'error');
                return null;
            }
        }

        // ====== TEST USERS API - FIXED (Line 62) ======
        async function testUsersAPI() {
            log('\n📡 Testing Users API...', 'info');
            try {
                const response = await fetch('/api/admin/users', {
                    credentials: 'include'
                });
                const data = await response.json();
                log(`✅ API Status: ${response.status}`, 'success');
                log(`📊 Users Found: ${data.users?.length || 0}`, 'info');
                
                // FIXED: Replaced forEach with standard for loop
                if (data.users) {
                    for (let i = 0; i < data.users.length; i++) {
                        const user = data.users[i];
                        log(`  - ${user.username} (${user.role})`, 'info');
                    }
                }
                return data;
            } catch (error) {
                log(`❌ API Error: ${error.message}`, 'error');
                return null;
            }
        }

        // ====== TEST CREATE USER - FIXED (Line 86) ======
        async function testCreateUser() {
            log('\n📡 Testing Create User Form...', 'info');
            
            const form = document.getElementById('addUserForm');
            if (!form) {
                log('❌ Add user form not found in DOM', 'error');
                return;
            }
            
            log('✅ Add user form exists', 'success');
            
            // FIXED: Replaced forEach with standard for loop
            const required = ['username', 'password', 'email', 'role'];
            for (let i = 0; i < required.length; i++) {
                const id = required[i];
                const el = document.getElementById(id);
                if (el) {
                    log(`✅ Field "${id}" exists`, 'success');
                } else {
                    log(`❌ Field "${id}" missing`, 'error');
                }
            }
        }

        // ====== CHECK LOCAL STORAGE - FIXED (Lines 101, 108) ======
        function checkLocalStorage() {
            log('\n📦 Checking Storage...', 'info');
            
            // Session Storage - Already using for loop (GOOD)
            log('Session Storage:', 'info');
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                log(`  ${key}: ${sessionStorage.getItem(key)}`, 'info');
            }
            
            // Cookies - FIXED: Replaced forEach with for loop
            log('Cookies:', 'info');
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                log(`  ${cookies[i].trim()}`, 'info');
            }
        }

        // ====== CHECK JAVASCRIPT ERRORS - FIXED (Line 123) ======
        function checkJavaScriptErrors() {
            log('\n🔍 Checking for Common JavaScript Errors...', 'info');
            
            // Check for missing variables - USING LOCAL log() function (FIXED)
            if (typeof SessionManager === 'undefined') {
                log('❌ SessionManager is not defined', 'error');
            } else {
                log('✅ SessionManager loaded', 'success');
            }
            
            // Check for broken functions - Already using for loop (GOOD)
            const functions = ['logout', 'loadUsers', 'showAddUserForm', 'editUser'];
            for (let i = 0; i < functions.length; i++) {
                const fn = functions[i];
                if (typeof window[fn] === 'function') {
                    log(`✅ Function "${fn}()" exists`, 'success');
                } else {
                    log(`❌ Function "${fn}()" is missing`, 'error');
                }
            }
        }

        // ====== RUN ALL TESTS ======
        async function runAllTests() {
            document.getElementById('output').innerHTML = '';
            log('🚀 Running All Tests...\n', 'info');
            
            await testSession();
            await testUsersAPI();
            await testCreateUser();
            checkLocalStorage();
            checkJavaScriptErrors();
            
            log('\n✅ Tests Complete!', 'success');
        }

        // ====== INITIALIZATION ======
        window.onload = function() {
            checkJavaScriptErrors();
        };
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof SessionManager !== 'undefined') {
                SessionManager.initPage();
            }
        });
    </script>
    

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    var mobileToggle = document.querySelector('.mobile-toggle');
    var navLinks = document.querySelector('.nav-links');
    
    if (mobileToggle && navLinks) {
        mobileToggle.addEventListener('click', function() {
            navLinks.classList.toggle('active');
        });
    }
});
</script>

</body>
</html>

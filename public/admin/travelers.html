    let currentEditId = null;

    let batchesData = [];

    let itemsPerPage = 10;
    let currentDocument = null;
    let currentDocumentName = '';
    let sessionWarningTimeout = null;
    let sessionLogoutTimeout = null;
    let warningShown = false;
    let notificationTimeout = null;

    // ====== INITIALIZATION ======
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            await SessionManager.initPage(initializePage);
        } catch (error) {
            console.error('Failed to initialize page:', error);
            showNotification('Failed to load page', 'error');
        }
    });

    async function initializePage() {
        console.log('✅ User authenticated, loading travelers page...');
        
        // Initialize session management
        resetSessionTimer();
        
        // Monitor user activity
        ['click', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, resetSessionTimer);
        });
        
        // Load data
        await loadBatches();
        await loadTravelers();
        setupPassportNameAutoFill();
    }

    // ====== SESSION MANAGEMENT ======
    function resetSessionTimer() {
        if (sessionWarningTimeout) clearTimeout(sessionWarningTimeout);
        if (sessionLogoutTimeout) clearTimeout(sessionLogoutTimeout);
        
        hideSessionWarning();
        
        // Show warning after 25 minutes (1500000 ms)
        sessionWarningTimeout = setTimeout(showSessionWarning, 1500000);
        
        // Auto logout after 30 minutes (1800000 ms)
        sessionLogoutTimeout = setTimeout(showSessionExpiredWarning, 1800000);
    }

    function showSessionWarning() {
        if (warningShown) return;
        
        const warning = document.getElementById('sessionWarning');
        const message = document.getElementById('sessionWarningMessage');
        if (!warning || !message) return;
        
        message.textContent = 'Your session will expire in 2 minutes. Click to extend.';
        warning.style.display = 'block';
        warningShown = true;
    }

    function hideSessionWarning() {
        const warning = document.getElementById('sessionWarning');
        if (warning) warning.style.display = 'none';
        warningShown = false;
    }

    function showSessionExpiredWarning() {
        hideSessionWarning();
        showNotification('Your session has expired. Redirecting to login...', 'warning');
        
        setTimeout(() => {
            SessionManager.logout();
        }, 3000);
    }

    async function extendSession() {
        try {
            await SessionManager.checkSession();
            hideSessionWarning();
            resetSessionTimer();
            showNotification('Session extended successfully', 'success');
        } catch (error) {
            console.error('Session extension failed:', error);
            showSessionExpiredWarning();
        }
    }

    // ====== NOTIFICATION ======
    function showNotification(message, type = 'success') {
        const notification = document.getElementById('notification');
        if (!notification) return;
        
        const icon = type === 'success' ? 'check-circle' : 
                    type === 'error' ? 'exclamation-circle' : 
                    type === 'warning' ? 'exclamation-triangle' : 'info-circle';
        
        notification.className = `notification notification-${type}`;
        notification.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
        notification.style.display = 'block';
        
        if (notificationTimeout) clearTimeout(notificationTimeout);
        
        notificationTimeout = setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }

    // ====== LOGOUT ======
    async function logout() {
        if (confirm('Are you sure you want to logout?')) {
            await SessionManager.logout();
        }
    }

    // ====== DOCUMENT HANDLING ======
    function handleFileSelect(input, textElementId, previewElementId) {
        const textElement = document.getElementById(textElementId);
        const previewElement = document.getElementById(previewElementId);
        
        if (input.files && input.files[0]) {
            const file = input.files[0];
            textElement.textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                let previewHtml = `
                    <div class="file-info">
                        <i class="fas fa-${file.type.includes('pdf') ? 'file-pdf' : 'file-image'}"></i>
                        <span>${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                    </div>
                    <div class="file-actions">
                        <button onclick="viewDocumentTemp('${e.target.result}', '${file.name}', '${file.type}')" title="View">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="removeDocument('${input.id}', '${textElementId}', '${previewElementId}')" class="delete" title="Remove">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                previewElement.innerHTML = previewHtml;
                previewElement.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        } else {
            textElement.textContent = textElementId.includes('edit') ? 'Click to update' : 'Click to upload';
            previewElement.style.display = 'none';
        }
    }

    function viewDocumentTemp(dataUrl, fileName, fileType) {
        currentDocument = { data: dataUrl, name: fileName, type: fileType };
        currentDocumentName = fileName;
        
        const titleEl = document.getElementById('documentViewerTitle');
        const contentEl = document.getElementById('documentViewerContent');
        
        titleEl.textContent = fileName;
        
        if (fileType.includes('pdf')) {
            contentEl.innerHTML = `<iframe src="${dataUrl}"></iframe>`;
        } else if (fileType.includes('image')) {
            contentEl.innerHTML = `<img src="${dataUrl}" alt="${fileName}" style="max-width:100%; max-height:500px;">`;
        } else {
            contentEl.innerHTML = `<p>Cannot preview this file type. Click Download to view.</p>`;
        }
        
        document.getElementById('documentViewerModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function downloadCurrentDocument() {
        if (!currentDocument) return;
        
        const link = document.createElement('a');
        link.href = currentDocument.data;
        link.download = currentDocument.name;
        link.click();
    }

    function removeDocument(inputId, textElementId, previewElementId) {
        const input = document.getElementById(inputId);
        input.value = '';
        
        document.getElementById(textElementId).textContent = textElementId.includes('edit') ? 'Click to update' : 'Click to upload';
        document.getElementById(previewElementId).style.display = 'none';
        
        showNotification('Document removed', 'success');
    }

    function closeDocumentViewer() {
        document.getElementById('documentViewerModal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
        currentDocument = null;
    }

    // ====== HELPER FUNCTIONS ======
    function formatDateForInput(dateStr) {
        if (!dateStr) return '';
        
        // If it's already in YYYY-MM-DD format
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
            return dateStr;
        }
        
        // Try to parse various date formats
        try {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '';
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        } catch (e) {
            console.warn('Date parsing error:', e);
            return '';
        }
    }

    // ====== AUTO-FILL PASSPORT NAME ======
    function setupPassportNameAutoFill() {
        const addFirst = document.getElementById('add_first_name');
        const addLast = document.getElementById('add_last_name');
        const addPassport = document.getElementById('add_passport_name');
        
        if (addFirst && addLast && addPassport) {
            const updateAddPassport = () => {
                const first = addFirst.value || '';
                const last = addLast.value || '';
                addPassport.value = `${first} ${last}`.trim();
            };
            addFirst.addEventListener('input', updateAddPassport);
            addLast.addEventListener('input', updateAddPassport);
        }
        
        const editFirst = document.getElementById('edit_first_name');
        const editLast = document.getElementById('edit_last_name');
        const editPassport = document.getElementById('edit_passport_name');
        
        if (editFirst && editLast && editPassport) {
            const updateEditPassport = () => {
                const first = editFirst.value || '';
                const last = editLast.value || '';
                editPassport.value = `${first} ${last}`.trim();
            };
            editFirst.addEventListener('input', updateEditPassport);
            editLast.addEventListener('input', updateEditPassport);
        }
    }

    // ====== LOAD BATCHES ======
    async function loadBatches() {
        try {
            const response = await fetch('/api/batches', { credentials: 'include' });
            const data = await response.json();
            
            if (data.success && data.batches) {
                batchesData = data.batches;
                updateBatchDropdowns(data.batches);
            } else {
                useFallbackBatches();
            }
        } catch (error) {
            console.error('Error loading batches:', error);
            useFallbackBatches();
        }
    }

    function useFallbackBatches() {
        batchesData = [
            { id: 1, batch_name: 'Haj Platinum 2026' },
            { id: 2, batch_name: 'Haj Gold 2026' },
            { id: 3, batch_name: 'Umrah Ramadhan Special' }
        ];
        updateBatchDropdowns(batchesData);
    }

    function updateBatchDropdowns(batches) {
        const addSelect = document.getElementById('add_batch_id');
        const editSelect = document.getElementById('edit_batch_id');
        
        if (addSelect) {
            addSelect.innerHTML = '<option value="">Select Batch</option>';
            batches.forEach(b => {
                addSelect.innerHTML += `<option value="${b.id}">${b.batch_name}</option>`;
            });
        }
        
        if (editSelect) {
            editSelect.innerHTML = '<option value="">Select Batch</option>';
            batches.forEach(b => {
                editSelect.innerHTML += `<option value="${b.id}">${b.batch_name}</option>`;
            });
        }
    }

    // ====== LOAD TRAVELERS ======
    async function loadTravelers() {
        const tableBody = document.getElementById('travelersTableBody');
        tableBody.innerHTML = '<tr><td colspan="9" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading travelers...</td></tr>';
        
        try {
            const response = await fetch('/api/travelers', { credentials: 'include' });
            const data = await response.json();
            
            if (data.success && data.travelers) {
                travelersData = data.travelers;
            } else {
                useFallbackTravelers();
            }
        } catch (error) {
            console.error('Error loading travelers:', error);
            useFallbackTravelers();
        }
        
        displayTravelers();
        updateDashboardStats();
    }

    function updateDashboardStats() {
        const total = travelersData.length;
        const active = travelersData.filter(t => t.passport_status === 'Active').length;
        const vaccinated = travelersData.filter(t => t.vaccine_status === 'Fully Vaccinated').length;
        const docsComplete = travelersData.filter(t => 
            t.passport_scan && t.aadhaar_scan && t.pan_scan && t.photo
        ).length;
        
        document.getElementById('totalTravelersCount').textContent = total;
        document.getElementById('activeTravelersCount').textContent = active;
        document.getElementById('vaccinatedCount').textContent = vaccinated;
        document.getElementById('documentsComplete').textContent = docsComplete;
    }

    function displayTravelers() {
        const tableBody = document.getElementById('travelersTableBody');
        if (!travelersData || travelersData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px;">No travelers found</td></tr>';
            updatePaginationInfo(0);
            return;
        }
        
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedData = travelersData.slice(start, end);
        
        let html = '';
        paginatedData.forEach(t => {
            const fullName = `${t.first_name || ''} ${t.last_name || ''}`.trim() || 'N/A';
            const batchName = t.batch_name || 'Not Assigned';
            
            const docIcons = `
                <div class="doc-icons">
                    <i class="fas fa-passport doc-icon ${t.passport_scan ? 'available' : 'missing'}" 
                       title="Passport Scan ${t.passport_scan ? '(Uploaded)' : '(Missing)'}"></i>
                    <i class="fas fa-id-card doc-icon ${t.aadhaar_scan ? 'available' : 'missing'}" 
                       title="Aadhaar Scan ${t.aadhaar_scan ? '(Uploaded)' : '(Missing)'}"></i>
                    <i class="fas fa-credit-card doc-icon ${t.pan_scan ? 'available' : 'missing'}" 
                       title="PAN Scan ${t.pan_scan ? '(Uploaded)' : '(Missing)'}"></i>
                    <i class="fas fa-syringe doc-icon ${t.vaccine_scan ? 'available' : 'missing'}" 
                       title="Vaccine Certificate ${t.vaccine_scan ? '(Uploaded)' : '(Missing)'}"></i>
                    <i class="fas fa-camera doc-icon ${t.photo ? 'available' : 'missing'}" 
                       title="Photo ${t.photo ? '(Uploaded)' : '(Missing)'}"></i>
                </div>
            `;
            
            let statusClass = 'status-active';
            if (t.passport_status === 'Submitted') statusClass = 'status-pending';
            if (t.passport_status === 'Processing') statusClass = 'status-warning';
            if (t.passport_status === 'Expired') statusClass = 'status-inactive';
            
            html += `<tr>
                <td>${t.id}</td>
                <td><strong>${escapeHtml(fullName)}</strong><br><small>${escapeHtml(t.passport_name || '')}</small></td>
                <td>${escapeHtml(t.passport_no || '-')}<br><small>Exp: ${t.passport_expiry_date || 'N/A'}</small></td>
                <td>${escapeHtml(t.mobile || '-')}</td>
                <td>${escapeHtml(t.email || '-')}</td>
                <td>${escapeHtml(batchName)}</td>
                <td><span class="status-badge ${statusClass}">${escapeHtml(t.passport_status || 'Active')}</span></td>
                <td>${docIcons}</td>
                <td>
                    <button class="icon-btn" onclick="viewTraveler(${t.id})" title="View Full Details"><i class="fas fa-eye"></i></button>
                    <button class="icon-btn" onclick="editTraveler(${t.id})" title="Edit"><i class="fas fa-edit"></i></button>
                    <button class="icon-btn" onclick="deleteTraveler(${t.id})" title="Delete"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        
        tableBody.innerHTML = html;
        updatePaginationInfo(travelersData.length);
    }

    function escapeHtml(text) {
        if (!text) return text;
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updatePaginationInfo(total) {
        document.getElementById('totalCount').textContent = total;
        const start = (currentPage - 1) * itemsPerPage + 1;
        const end = Math.min(currentPage * itemsPerPage, total);
        document.getElementById('showingFrom').textContent = total > 0 ? start : 0;
        document.getElementById('showingTo').textContent = total > 0 ? end : 0;
        
        document.getElementById('prevPageBtn').disabled = currentPage === 1;
        document.getElementById('nextPageBtn').disabled = end >= total;
    }

    function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            displayTravelers();
        }
    }

    function nextPage() {
        if (currentPage * itemsPerPage < travelersData.length) {
            currentPage++;
            displayTravelers();
        }
    }

    function showAddTravelerForm() {
        document.getElementById('addTravelerForm').style.display = 'block';
        loadBatches();
        document.getElementById('addTravelerForm').scrollIntoView({ behavior: 'smooth' });
    }

    function hideAddTravelerForm() {
        document.getElementById('addTravelerForm').style.display = 'none';
        document.getElementById('travelerAddForm').reset();
        
        const previewIds = [
            'add_passport_scan_preview', 'add_aadhaar_scan_preview', 
            'add_pan_scan_preview', 'add_vaccine_scan_preview', 'add_photo_preview'
        ];
        const textIds = [
            'add_passport_scan_text', 'add_aadhaar_scan_text', 
            'add_pan_scan_text', 'add_vaccine_scan_text', 'add_photo_text'

        previewIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
        
        textIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = id.includes('photo') ? 'Click to upload photograph' : 'Click to upload';

    function hideEditTravelerForm() {
        document.getElementById('editTravelerForm').style.display = 'none';
        currentEditId = null;

        ];
        const textIds = [

        ];
        
        previewIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
        
        textIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.textContent = 'Click to update';
        });
    }

    // ====== CREATE TRAVELER ======
    async function createTraveler() {
        const formData = new FormData(document.getElementById('travelerAddForm'));
        
        // Add all fields to FormData
        const fields = {
            first_name: document.getElementById('add_first_name').value,
            last_name: document.getElementById('add_last_name').value,
            passport_name: document.getElementById('add_passport_name').value,
            batch_id: document.getElementById('add_batch_id').value,
            passport_no: document.getElementById('add_passport_no').value,
            passport_issue_date: document.getElementById('add_passport_issue_date').value,
            passport_expiry_date: document.getElementById('add_passport_expiry_date').value,
            passport_status: document.getElementById('add_passport_status').value,
            gender: document.getElementById('add_gender').value,
            dob: document.getElementById('add_dob').value,
            mobile: document.getElementById('add_mobile').value,
            email: document.getElementById('add_email').value,
            aadhaar: document.getElementById('add_aadhaar').value,
            pan: document.getElementById('add_pan').value,
            aadhaar_pan_linked: document.getElementById('add_aadhaar_pan_linked').value,
            vaccine_status: document.getElementById('add_vaccine_status').value,
            wheelchair: document.getElementById('add_wheelchair').value,
            place_of_birth: document.getElementById('add_place_of_birth').value,
            place_of_issue: document.getElementById('add_place_of_issue').value,
            passport_address: document.getElementById('add_passport_address').value,
            father_name: document.getElementById('add_father_name').value,
            mother_name: document.getElementById('add_mother_name').value,
            spouse_name: document.getElementById('add_spouse_name').value,
            pin: document.getElementById('add_pin').value,
            emergency_contact: document.getElementById('add_emergency_contact').value,
            emergency_phone: document.getElementById('add_emergency_phone').value,
            medical_notes: document.getElementById('add_medical_notes').value
        };
        
        // Append all fields to FormData
        Object.keys(fields).forEach(key => {
            if (fields[key]) formData.append(key, fields[key]);
        });
        
        if (!fields.first_name || !fields.last_name || !fields.passport_no || !fields.mobile) {
            showNotification('Please fill all required fields', 'error');
            return;
        }
        
        if (!fields.batch_id) {
            showNotification('Please select a batch', 'error');
            return;
        }
        
        try {
            const response = await fetch('/api/travelers', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if (data.success) {
                showNotification('Traveler created successfully!', 'success');
                hideAddTravelerForm();
                loadTravelers();
            } else {
                showNotification('Error: ' + (data.error || 'Could not create traveler'), 'error');
            }
        } catch (error) {
            console.error('Create error:', error);
            showNotification('Network error. Please try again.', 'error');
        }
    }

        document.getElementById('edit_mobile').value = traveler.mobile || '';
        document.getElementById('edit_email').value = traveler.email || '';
        document.getElementById('edit_aadhaar').value = traveler.aadhaar || '';
        document.getElementById('edit_pan').value = traveler.pan || '';
        document.getElementById('edit_aadhaar_pan_linked').value = traveler.aadhaar_pan_linked || 'No';
        document.getElementById('edit_vaccine_status').value = traveler.vaccine_status || 'Not Vaccinated';

        document.getElementById('edit_spouse_name').value = traveler.spouse_name || '';

        showExistingDocumentPreview('edit_vaccine_scan_preview', traveler.vaccine_scan, 'Vaccine');
        showExistingDocumentPreview('edit_photo_preview', traveler.photo, 'Photo');
        
        document.getElementById('editTravelerForm').style.display = 'block';
        document.getElementById('editTravelerForm').scrollIntoView({ behavior: 'smooth' });

    function showExistingDocumentPreview(previewElementId, filename, docType) {
        if (!filename) return;
        
        const previewElement = document.getElementById(previewElementId);
        if (!previewElement) return;
        
        const previewHtml = `
            <div class="file-info">
                <i class="fas fa-file"></i>
                <span>${filename} (Existing file)</span>
            </div>

    // ====== UPDATE TRAVELER ======
    async function updateTraveler() {
        if (!currentEditId) {
            showNotification('No traveler selected for editing', 'error');
            return;
        }
        
        const formData = new FormData(document.getElementById('travelerEditForm'));
        
        // Add all fields to FormData
        const fields = {
            first_name: document.getElementById('edit_first_name').value,
            last_name: document.getElementById('edit_last_name').value,
            passport_name: document.getElementById('edit_passport_name').value,
            batch_id: document.getElementById('edit_batch_id').value,
            passport_no: document.getElementById('edit_passport_no').value,
            passport_issue_date: document.getElementById('edit_passport_issue_date').value,
            passport_expiry_date: document.getElementById('edit_passport_expiry_date').value,
            passport_status: document.getElementById('edit_passport_status').value,
            gender: document.getElementById('edit_gender').value,
            dob: document.getElementById('edit_dob').value,
            mobile: document.getElementById('edit_mobile').value,
            email: document.getElementById('edit_email').value,
            aadhaar: document.getElementById('edit_aadhaar').value,
            pan: document.getElementById('edit_pan').value,
            aadhaar_pan_linked: document.getElementById('edit_aadhaar_pan_linked').value,
            vaccine_status: document.getElementById('edit_vaccine_status').value,
            wheelchair: document.getElementById('edit_wheelchair').value,
            place_of_birth: document.getElementById('edit_place_of_birth').value,
            place_of_issue: document.getElementById('edit_place_of_issue').value,
            passport_address: document.getElementById('edit_passport_address').value,
            father_name: document.getElementById('edit_father_name').value,
            mother_name: document.getElementById('edit_mother_name').value,
            spouse_name: document.getElementById('edit_spouse_name').value,
            pin: document.getElementById('edit_pin').value,
            emergency_contact: document.getElementById('edit_emergency_contact').value,
            emergency_phone: document.getElementById('edit_emergency_phone').value,
            medical_notes: document.getElementById('edit_medical_notes').value
        };
        
        // Append all fields to FormData
        Object.keys(fields).forEach(key => {
            if (fields[key]) formData.append(key, fields[key]);
        });
        
        try {
            const response = await fetch(`/api/travelers/${currentEditId}`, {
                method: 'PUT',
                body: formData,
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if (data.success) {
                showNotification('Traveler updated successfully!', 'success');
                hideEditTravelerForm();
                loadTravelers();
            } else {
                showNotification('Error: ' + (data.error || 'Update failed'), 'error');
            }
        } catch (error) {
            console.error('Update error:', error);
            showNotification('Network error. Please try again.', 'error');
        }
    }

    // ====== DELETE TRAVELER ======
    async function deleteTraveler(id) {
        if (!confirm('Are you sure you want to delete this traveler? This action cannot be undone.')) {
            return;
        }
        
        try {
            const response = await fetch(`/api/travelers/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            
            const data = await response.json();
            
            if (data.success) {
                showNotification('Traveler deleted successfully!', 'success');
                loadTravelers();
            } else {
                showNotification('Error: ' + (data.error || 'Could not delete traveler'), 'error');
            }
        } catch (error) {
            console.error('Delete error:', error);
            showNotification('Network error. Please try again.', 'error');
        }
    }

    function downloadTravelerPDF() {
        const content = document.getElementById('travelerDetails')?.innerHTML;
        if (!content) return;
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const nameMatch = content.match(/Full Name:<\/strong> <span>([^<]+)/);
        const travelerName = nameMatch ? nameMatch[1].trim() : 'Traveler';
        
        doc.setFontSize(18);
        doc.text(`Alhudha Haj Travel - Traveler Details`, 14, 22);
        doc.setFontSize(11);
        doc.text(`Traveler: ${travelerName}`, 14, 30);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 37);
        
        doc.setFontSize(12);
        doc.text('Personal Information', 14, 47);
        doc.setFontSize(10);
        
        let yPos = 54;
        const sections = content.split('<h4');
        
        sections.forEach(section => {
            const lines = section.replace(/<[^>]*>/g, '\n').split('\n');
            lines.forEach(line => {
                line = line.trim();
                if (line && !line.includes('style') && !line.includes('class')) {
                    if (yPos > 270) {
                        doc.addPage();
                        yPos = 20;
                    }
                    doc.text(line, 14, yPos);
                    yPos += 6;
                }
            });
        });
        
        doc.save(`traveler_${travelerName.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`);
        showNotification('Traveler PDF downloaded!', 'success');
    }

    function uploadCSV() {
        const fileInput = document.getElementById('csvFileInput');
        if (!fileInput.files || fileInput.files.length === 0) {
            showNotification('Please select a CSV file', 'error');
            return;
        }
        
        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const csv = e.target.result;
            const lines = csv.split('\n');
            const headers = lines[0].split(',');
            
            const previewDiv = document.getElementById('csvPreview');
            const previewContent = document.getElementById('csvPreviewContent');
            
            let previewHtml = '<table style="width:100%; border-collapse:collapse;">';
            previewHtml += '<tr>';
            headers.slice(0, 10).forEach(h => {
                previewHtml += `<th style="padding:8px; border:1px solid #ddd;">${h}</th>`;
            });
            previewHtml += '<th>...</th></tr>';
            
            for (let i = 1; i < Math.min(lines.length, 6); i++) {
                if (lines[i].trim()) {
                    const cells = lines[i].split(',');
                    previewHtml += '<tr>';
                    for (let j = 0; j < Math.min(10, cells.length); j++) {
                        previewHtml += `<td style="padding:8px; border:1px solid #ddd;">${cells[j]?.replace(/"/g, '')}</td>`;
                    }
                    previewHtml += '<td>...</td></tr>';
                }
            }
            
            previewHtml += '</table>';
            previewContent.innerHTML = previewHtml;
            previewDiv.style.display = 'block';
            
            showNotification('CSV preview loaded. Click Upload & Process to confirm.', 'success');
        };
        
        reader.readAsText(file);
    }

    // ====== SEARCH FUNCTIONS ======
    function searchTravelers() {
        const search = document.getElementById('searchTravelers').value.toLowerCase().trim();
        
        if (!search) {
            displayTravelers();
            return;
        }
        
        const filtered = travelersData.filter(t => {
            const fullName = `${t.first_name || ''} ${t.last_name || ''}`.toLowerCase();
            const passport = (t.passport_no || '').toLowerCase();
            const mobile = (t.mobile || '').toLowerCase();
            const email = (t.email || '').toLowerCase();
            const batch = (t.batch_name || '').toLowerCase();
            
            return fullName.includes(search) || passport.includes(search) || 
                   mobile.includes(search) || email.includes(search) || batch.includes(search);
        });
        
        currentPage = 1;
        const originalData = travelersData;
        travelersData = filtered;
        displayTravelers();
        travelersData = originalData;
    }

    function clearSearch() {
        document.getElementById('searchTravelers').value = '';
        displayTravelers();
    }

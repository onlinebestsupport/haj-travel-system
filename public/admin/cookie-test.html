<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/admin/admin-style.css">
    <title>Cookie Test</title>
</head>
<body>
    <h1>🔍 Cookie Test for localhost</h1>
    
    <div style="padding: 20px; background: #f0f0f0; margin: 10px;">
        <button onclick="testLogin()" style="padding: 10px; margin: 5px;">1. Test Login</button>
        <button onclick="SessionManager.checkSession()" style="padding: 10px; margin: 5px;">2. Check Session</button>
        <button onclick="showCookies()" style="padding: 10px; margin: 5px;">3. Show Cookies</button>
        <button onclick="clearAll()" style="padding: 10px; margin: 5px;">4. Clear All</button>
    </div>
    
    <div id="result" style="padding: 20px; background: #000; color: #0f0; font-family: monospace;"></div>

    <script>
        function SessionManager.log(msg) {
            document.getElementById('result').innerHTML += msg + '<br>';
        }

        async function testLogin() {
            document.getElementById('result').innerHTML = '';
            SessionManager.log('📝 Testing login...');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({
                        username: 'superadmin',
                        password: 'admin123',
                        remember_me: true
                    })
                });
                
                SessionManager.log('📡 Status: ' + response.status);
                
                // Check if Set-Cookie header exists
                const setCookie = response.headers.get('Set-Cookie');
                SessionManager.log('🍪 Set-Cookie header: ' + (setCookie || 'NONE'));
                
                const data = await response.json();
                SessionManager.log('📡 Response: ' + JSON.stringify(data));
                
                if (data.authenticated) {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminName', data.user.name);
                    SessionManager.log('✅ Login successful!');
                }
                
                showCookies();
                
            } catch (error) {
                SessionManager.log('❌ Error: ' + error);
            }
        }

        async function SessionManager.checkSession() {
            document.getElementById('result').innerHTML = '';
            SessionManager.log('🔍 Checking session...');
            
            try {
                const response = await fetch('/api/check-session', {
                    credentials: 'include'
                });
                
                SessionManager.log('📡 Status: ' + response.status);
                const data = await response.json();
                SessionManager.log('📡 Response: ' + JSON.stringify(data));
                
                showCookies();
                
            } catch (error) {
                SessionManager.log('❌ Error: ' + error);
            }
        }

        function showCookies() {
            SessionManager.log('\n🍪 Document cookies: ' + (document.cookie || 'NONE'));
            
            if (document.cookie) {
                const cookies = document.cookie.split(';');
                cookies.forEach(c => SessionManager.log('   ' + c.trim()));
            }
            
            SessionManager.log('📦 Session storage: ' + JSON.stringify(sessionStorage));
        }

        function clearAll() {
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            sessionStorage.clear();
            SessionManager.log('✅ All cleared');
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof SessionManager !== 'undefined') {
                SessionManager.initPage();
            }
        });
    </script>
    

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    var mobileToggle = document.querySelector('.mobile-toggle');
    var navLinks = document.querySelector('.nav-links');
    
    if (mobileToggle && navLinks) {
        mobileToggle.addEventListener('click', function() {
            navLinks.classList.toggle('active');
        });
    }
});
</script>

</body>
</html>
